<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 响应式适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>awa...</title>
    <style>
        /* 全局重置 + 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面背景：柔和纯色，护眼 */
        body {
            min-height: 100vh;
            background-color: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 核心容器：仅包裹问题栏 */
        .question-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        /* 标题：简洁提示 */
        .title {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 500;
        }

        /* 问题输入栏（核心） */
        #question-input {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 1px solid #e1e5ee;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border 0.3s;
            margin-bottom: 20px;
        }

        /* 输入框聚焦效果 */
        #question-input:focus {
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64,158,255,0.1);
        }

        /* 提交按钮 */
        #submit-btn {
            width: 100%;
            height: 48px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* 按钮悬停效果 */
        #submit-btn:hover {
            background-color: #338eef;
        }

        /* 提交提示文字 */
        .tip {
            text-align: center;
            margin-top: 15px;
            color: #67c23a;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="question-container">
        <h2 class="title">I prefer hot love.Could I konw what you wanna do?</h2>
        <!-- 核心：问题输入栏 -->
        <textarea id="question-input" placeholder="输入你的回答"></textarea>
        <!-- 提交按钮 -->
        <button id="submit-btn">。。。</button>
        <!-- 提交提示 -->
        <div class="tip" id="tip">。。。</div>
    </div>

    <script>
        // 获取元素
        const input = document.getElementById('question-input');
        const btn = document.getElementById('submit-btn');
        const tip = document.getElementById('tip');

        // 提交功能
        btn.addEventListener('click', function() {
            // 去除空字符，判断是否输入内容
            const question = input.value.trim();
            if (!question) {
                tip.textContent = '请输入问题内容！';
                tip.style.color = '#f56c6c';
                tip.style.display = 'block';
                return;
            }

            // 模拟提交成功
            tip.textContent = '问题提交成功！';
            tip.style.color = '#67c23a';
            tip.style.display = 'block';
            
            // 清空输入框
            input.value = '';
            
            // 3秒后隐藏提示
            setTimeout(() => {
                tip.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
