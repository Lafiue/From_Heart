<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> awa... </title>
    <style>
        /* 全局重置样式，消除默认边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面主体：柔和渐变背景 + 居中布局 */
        body {
            /* 莫兰迪柔和渐变色调（粉→蓝） */
            background: linear-gradient(135deg, #f8e9f0 0%, #e0f0f9 100%);
            min-height: 100vh;
            /* 弹性布局，文字垂直+水平居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 字体：优雅无衬线体 */
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }

        /* 文字容器：柔和圆角+轻微阴影+内边距 */
        .text-box {
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 40px 30px;
            /* 柔和阴影，不突兀 */
            box-shadow: 0 8px 30px rgba(180, 160, 200, 0.1);
            /* 加载淡入动画 */
            animation: fadeIn 1.2s ease-in-out;
        }

        /* 核心文字样式 */
        .soft-text {
            font-size: clamp(1.2rem, 3vw, 2rem); /* 响应式字号 */
            color: #5a5466; /* 柔和深灰紫，护眼不刺眼 */
            line-height: 1.8; /* 行高舒适，易阅读 */
            text-align: center;
            letter-spacing: 0.5px; /* 轻微字间距，更优雅 */
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="text-box">
        <!-- 你需要的文字（已修正拼写：konw → know） -->
        <p class="soft-text">I prefer hot love. Could I know what you wanna do?</p>
    </div>
</body>
</html>
